name: cotizo
description: Cotiza y Vende Autopartes automotrices.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  blur: ^3.1.0
  cached_network_image: ^3.2.1
  camera: ^0.9.7+1
  cron: ^0.5.0
  cupertino_icons: ^1.0.2
  extended_image: ^6.2.1
  firebase_core: ^1.17.0
  flutter:
    sdk: flutter
  flutter_image_compress: ^1.1.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^1.1.0
  get_it: ^7.2.0
  go_router: ^4.1.0
  google_fonts: ^3.0.1
  google_sign_in: ^5.3.1
  googleapis: ^8.1.0
  hive: ^2.2.1
  hive_flutter: ^1.1.0
  http: ^0.13.4
  image_picker: ^0.8.5+3
  image_size_getter: ^2.1.1
  infinite_scroll_pagination: ^3.2.0
  native_device_orientation: ^1.1.4
  path_provider: ^2.0.10
  provider: ^6.0.3

dev_dependencies:
  build_runner: ^2.1.11
  flutter_lints: ^2.0.1
  flutter_test:
    sdk: flutter
  hive_generator: ^1.1.3

flutter:

  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/svgs/
    - assets/images/
